name: Manual Launch

on:
  workflow_dispatch: # Это создаёт кнопку ручного запуска

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install
      run: pip install requests

    - name: Run
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: python bot.py
