<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitget Analytics Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0e12; color: #e2e8f0; font-family: sans-serif; }
        .active-lang { background-color: #00b4c9 !important; color: #0d0e12 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto flex justify-between items-center border-b border-gray-800 pb-4 mb-8">
        <div class="flex items-center space-x-3">
            <div class="bg-[#00b4c9] text-[#0d0e12] font-bold px-3 py-1 rounded text-sm">PRO</div>
            <h1 class="text-xl font-bold tracking-wider text-white">BITGET INTEL</h1>
        </div>
        <div class="flex space-x-2 bg-gray-900 p-1 rounded border border-gray-800">
            <button onclick="setLang('ru')" id="btn-ru" class="px-3 py-1 rounded text-xs font-semibold uppercase active-lang">RU</button>
            <button onclick="setLang('en')" id="btn-en" class="px-3 py-1 rounded text-xs font-semibold uppercase">EN</button>
            <button onclick="setLang('es')" id="btn-es" class="px-3 py-1 rounded text-xs font-semibold uppercase">ES</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto">
        <div class="mb-6 flex items-center space-x-2">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <h2 class="text-xs uppercase tracking-widest text-gray-400 font-bold" id="feed-title">Поток сигналов и аналитики</h2>
        </div>

        <div id="analytics-feed" class="space-y-6">
            <div class="text-gray-500 text-sm py-8 text-center border border-dashed border-gray-800 rounded" id="loading-text">
                Загрузка актуальных данных рынка...
            </div>
        </div>
    </main>

    <script>
        let currentLang = 'ru';
        let allArticles = [];

        // Переключение языков
        function setLang(lang) {
            currentLang = lang;
            ['ru', 'en', 'es'].forEach(l => {
                document.getElementById(`btn-${l}`).classList.remove('active-lang');
            });
            document.getElementById(`btn-${lang}`).classList.add('active-lang');
            
            // Обновление интерфейса
            const titles = { ru: 'Поток сигналов и аналитики', en: 'Live Signal & Analytics Feed', es: 'Flujo de Señales y Analítica' };
            document.getElementById('feed-title').innerText = titles[lang];
            
            renderFeed();
        }

        // Поиск сгенерированных роботом файлов через GitHub API
        async function loadArticles() {
            const repo = "bitget-analytics/bitget-analytics.github.io";
            try {
                // Запрашиваем список файлов в папке articles
                const response = await fetch(`https://api.github.com/repos/${repo}/contents/articles`);
                if (!response.ok) throw new Error('No articles yet');
                const files = await response.json();
                
                // Сортируем файлы по имени (времени создания), чтобы новые были сверху
                files.sort((a, b) => b.name.localeCompare(a.name));

                // Скачиваем данные каждого файла
                allArticles = await Promise.all(files.map(async file => {
                    const res = await fetch(file.download_url);
                    return await res.json();
                }));

                renderFeed();
            } catch (err) {
                document.getElementById('analytics-feed').innerHTML = `
                    <div class="text-gray-500 text-sm py-8 text-center border border-dashed border-gray-800 rounded">
                        ${currentLang === 'ru' ? 'Скрипт ещё не совершил первый прогон. Запустите Manual Launch в Actions.' : 'Waiting for the first automated workflow run.'}
                    </div>`;
            }
        }

        // Отрисовка ленты на выбранном языке
        function renderFeed() {
            if (allArticles.length === 0) return;
            const container = document.getElementById('analytics-feed');
            container.innerHTML = '';

            allArticles.forEach(art => {
                const data = art[currentLang] || art['ru']; // если перевода нет, берем ру
                
                const card = document.createElement('div');
                card.className = "bg-gray-900 border border-gray-800 rounded p-5 hover:border-gray-700 transition duration-200";
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="bg-gray-800 text-[#00b4c9] text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border border-gray-700">
                            ${data.badge}
                        </span>
                        <span class="text-[11px] text-gray-500">${art.date || ''}</span>
                    </div>
                    <h3 class="text-lg font-bold text-white mb-2 tracking-tight">${data.title}</h3>
                    <p class="text-gray-400 text-sm leading-relaxed">${data.description}</p>
                `;
                container.appendChild(card);
            });
        }

        // Старт при загрузке
        loadArticles();
    </script>
</body>
</html>
